sources:
  inventory_bq:
    kind: bigquery
    project: jyothiapikey1

tools:
  get_low_stock_materials:
    kind: bigquery-sql
    source: inventory_bq
    description: >
      Returns raw materials whose current stock is at or below the reorder level.
      Use this when the user asks about low stock, materials to reorder, or stock alerts.
    statement: |
      WITH open_po AS (
        SELECT
          material_id,
          SUM(qty_ordered - IFNULL(qty_received, 0)) AS open_po_qty
        FROM `jyothiapikey1.inventory_db.purchase_orders`
        WHERE status IN ('Pending', 'In Transit', 'Delayed')
        GROUP BY material_id
      )
      SELECT
        m.material_id,
        m.name,
        m.category,
        m.current_stock,
        IFNULL(op.open_po_qty, 0) AS open_po_qty,
        (m.current_stock + IFNULL(op.open_po_qty, 0)) AS total_available_qty,
        m.reorder_level,
        m.unit,
        m.unit_cost,
        m.warehouse,
        s.name AS supplier_name,
        s.avg_lead_days
      FROM `jyothiapikey1.inventory_db.raw_materials` m
      JOIN `jyothiapikey1.inventory_db.suppliers` s USING (supplier_id)
      LEFT JOIN open_po op USING (material_id)
      WHERE (m.current_stock + IFNULL(op.open_po_qty, 0)) <= m.reorder_level
      ORDER BY ((m.current_stock + IFNULL(op.open_po_qty, 0)) / m.reorder_level) ASC

  get_inventory_summary:
    kind: bigquery-sql
    source: inventory_bq
    description: >
      Returns a summary of total inventory value, count of materials, and how many
      are critically low. Use for overview or inventory status queries.
    statement: |
      WITH open_po AS (
        SELECT
          material_id,
          SUM(qty_ordered - IFNULL(qty_received, 0)) AS open_po_qty
        FROM `jyothiapikey1.inventory_db.purchase_orders`
        WHERE status IN ('Pending', 'In Transit', 'Delayed')
        GROUP BY material_id
      ),
      material_totals AS (
        SELECT
          m.material_id,
          m.current_stock,
          m.reorder_level,
          m.unit_cost,
          m.warehouse,
          m.category,
          IFNULL(op.open_po_qty, 0) AS open_po_qty,
          (m.current_stock + IFNULL(op.open_po_qty, 0)) AS total_available_qty
        FROM `jyothiapikey1.inventory_db.raw_materials` m
        LEFT JOIN open_po op USING (material_id)
      )
      SELECT
        COUNT(*) AS total_materials,
        ROUND(SUM(current_stock * unit_cost), 2) AS total_inventory_value_inr,
        ROUND(SUM(current_stock), 2) AS total_current_stock_qty,
        ROUND(SUM(open_po_qty), 2) AS total_open_po_qty,
        ROUND(SUM(total_available_qty), 2) AS total_available_qty,
        COUNTIF(total_available_qty <= reorder_level) AS critical_low_count,
        COUNTIF(total_available_qty <= reorder_level * 0.5) AS danger_count,
        COUNT(DISTINCT warehouse) AS warehouse_count,
        COUNT(DISTINCT category) AS category_count
      FROM material_totals

  get_materials_by_category:
    kind: bigquery-sql
    source: inventory_bq
    description: >
      Returns all materials filtered by a category such as Metals, Polymers, Fluids,
      Chemicals, Composites, Fasteners, or Consumables.
    parameters:
      - name: category
        type: string
        description: "Material category name, e.g. Metals"
    statement: |
      WITH open_po AS (
        SELECT
          material_id,
          SUM(qty_ordered - IFNULL(qty_received, 0)) AS open_po_qty
        FROM `jyothiapikey1.inventory_db.purchase_orders`
        WHERE status IN ('Pending', 'In Transit', 'Delayed')
        GROUP BY material_id
      )
      SELECT
        m.material_id,
        m.name,
        m.current_stock,
        IFNULL(op.open_po_qty, 0) AS open_po_qty,
        (m.current_stock + IFNULL(op.open_po_qty, 0)) AS total_available_qty,
        m.reorder_level,
        m.unit,
        m.unit_cost,
        ROUND(m.current_stock * m.unit_cost, 2) AS stock_value_inr,
        m.warehouse,
        s.name AS supplier_name
      FROM `jyothiapikey1.inventory_db.raw_materials` m
      JOIN `jyothiapikey1.inventory_db.suppliers` s USING (supplier_id)
      LEFT JOIN open_po op USING (material_id)
      WHERE LOWER(m.category) = LOWER(@category)
      ORDER BY total_available_qty DESC

  get_pending_purchase_orders:
    kind: bigquery-sql
    source: inventory_bq
    description: >
      Returns all open, pending, in-transit, or delayed purchase orders
      with material and supplier details.
    statement: |
      SELECT
        po.po_id,
        m.name AS material_name,
        s.name AS supplier_name,
        po.qty_ordered,
        m.unit,
        po.order_date,
        po.expected_date,
        po.status,
        DATE_DIFF(po.expected_date, CURRENT_DATE(), DAY) AS days_until_delivery
      FROM `jyothiapikey1.inventory_db.purchase_orders` po
      JOIN `jyothiapikey1.inventory_db.raw_materials` m USING (material_id)
      JOIN `jyothiapikey1.inventory_db.suppliers` s USING (supplier_id)
      WHERE po.status IN ('Pending', 'In Transit', 'Delayed')
      ORDER BY po.expected_date ASC

  get_supplier_locations:
    kind: bigquery-sql
    source: inventory_bq
    description: >
      Returns supplier details with their city locations.
      Use when the user asks where suppliers are located or asks for supplier city list.
    statement: |
      SELECT
        supplier_id,
        name AS supplier_name,
        city,
        rating,
        avg_lead_days,
        is_active
      FROM `jyothiapikey1.inventory_db.suppliers`
      ORDER BY city ASC, supplier_name ASC

  get_top_consumed_materials:
    kind: bigquery-sql
    source: inventory_bq
    description: >
      Returns the most consumed raw materials over the last 30 days.
      Use for fast-moving materials or top consumption queries.
    parameters:
      - name: limit
        type: integer
        description: "Number of top materials to return, e.g. 5"
    statement: |
      SELECT
        m.name,
        m.category,
        SUM(c.qty_consumed) AS total_consumed,
        m.unit,
        m.current_stock,
        s.name AS supplier_name,
        s.city AS supplier_city,
        ROUND(SUM(c.qty_consumed) * m.unit_cost, 2) AS consumption_value_inr
      FROM `jyothiapikey1.inventory_db.consumption_log` c
      JOIN `jyothiapikey1.inventory_db.raw_materials` m USING (material_id)
      JOIN `jyothiapikey1.inventory_db.suppliers` s USING (supplier_id)
      WHERE c.log_date >= DATE_SUB(CURRENT_DATE(), INTERVAL 30 DAY)
      GROUP BY m.name, m.category, m.unit, m.current_stock, m.unit_cost, s.name, s.city
      ORDER BY total_consumed DESC
      LIMIT @limit

  get_warehouse_stock_breakdown:
    kind: bigquery-sql
    source: inventory_bq
    description: >
      Returns stock value and material count grouped by warehouse.
      Use for warehouse overview or breakdown queries.
    statement: |
      SELECT
        warehouse,
        COUNT(*) AS material_count,
        ROUND(SUM(current_stock * unit_cost), 2) AS total_value_inr,
        COUNTIF(current_stock <= reorder_level) AS low_stock_count
      FROM `jyothiapikey1.inventory_db.raw_materials`
      GROUP BY warehouse
      ORDER BY total_value_inr DESC